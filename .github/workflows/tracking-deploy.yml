name: Deploy Tracking Web

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - ".github/workflows/tracking-deploy.yml"
      - "apps/tracking-web/**"
      - "packages/**"
      - "package.json"
      - "tsconfig.base.json"
      - "firebase.json"
      - ".firebaserc"

jobs:
  deploy-tracking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build tracking web
        run: npm run build -w apps/tracking-web
        env:
          VITE_FIREBASE_API_KEY: AIzaSyBIy_RMiEIyYlZWYiuo1UdQliTln4smHx8
          VITE_FIREBASE_AUTH_DOMAIN: botix-e493b.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: botix-e493b
          VITE_FIREBASE_STORAGE_BUCKET: botix-e493b.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 213505703707
          VITE_FIREBASE_APP_ID: 1:213505703707:web:798a040c888c6b58e95dbe
          VITE_FIREBASE_MEASUREMENT_ID: G-RXFY7ZGHVY

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy tracking hosting
        run: firebase deploy --only hosting:tracking --project botix-e493b
        # Triggered via commit when hosting credentials are updated.
