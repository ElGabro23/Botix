name: Build Driver APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - ".github/workflows/driver-apk.yml"
      - "apps/driver/**"
      - "packages/**"
      - "package.json"
      - "tsconfig.base.json"

jobs:
  android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install
        working-directory: apps/driver

      - name: Prebuild Android
        run: npx expo prebuild --clean --platform android --non-interactive
        working-directory: apps/driver
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: AIzaSyBIy_RMiEIyYlZWYiuo1UdQliTln4smHx8
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: botix-e493b.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: botix-e493b
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: botix-e493b.firebasestorage.app
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 213505703707
          EXPO_PUBLIC_FIREBASE_APP_ID: 1:213505703707:web:798a040c888c6b58e95dbe
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: G-RXFY7ZGHVY

      - name: Patch Gradle config
        run: sed -i '/enableBundleCompression/d' android/app/build.gradle
        working-directory: apps/driver

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: apps/driver/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: botix-driver-apk
          path: apps/driver/android/app/build/outputs/apk/debug/*.apk
